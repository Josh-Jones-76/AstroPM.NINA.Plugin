<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24">
  <rect width="24" height="24" fill="#2d2d2d"/>
  <!-- Clock face -->
  <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Hour hand -->
  <path d="M12,12 L12,5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <path d="M12,12 L17,9" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1" fill="white"/>
  <!-- Hour dots -->
  <circle cx="12" cy="3.5" r="0.7" fill="white"/>
  <circle cx="20.5" cy="12" r="0.7" fill="white"/>
  <circle cx="12" cy="20.5" r="0.7" fill="white"/>
  <circle cx="3.5" cy="12" r="0.7" fill="white"/>
</svg>
